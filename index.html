<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineClipper AI Studio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 30px; }
        .container { max-width: 800px; margin: auto; background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; }
        h1 { text-align: center; color: #58a6ff; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { background: #238636; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
        button:hover { background: #2ea043; }
        .card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }
        .vo-box { background: #0d1117; padding: 15px; border-left: 4px solid #f0883e; margin-bottom: 15px; }
        .thumb-box { background: #0d1117; padding: 15px; border-left: 4px solid #8957e5; margin-bottom: 15px; }
        video { width: 100%; border-radius: 8px; margin-top: 15px; border: 2px solid #58a6ff; }
        .btn-dl { background: #1f6feb; text-align: center; display: block; text-decoration: none; padding: 12px; border-radius: 6px; margin-top: 10px; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 CineClipper AI Studio</h1>
    
    <label>Link YouTube (Movie/Drakor/Podcast):</label>
    <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=...">

    <label>Target Durasi & Strategi Potong:</label>
    <select id="durasi">
        <option value="50 Detik (Wajib 4 Klip, 120-130 Kata)">🔥 Shorts 50 Detik (Vertikal 9:16)</option>
        <option value="5 Menit (Wajib 7 Klip, 700-750 Kata)">📺 Long 5 Menit (Normal 16:9)</option>
        <option value="10 Menit (Wajib 12 Klip, 1400-1500 Kata)">🍿 Long 10 Menit (Normal 16:9)</option>
    </select>

    <label>Bahasa Voice Over (Pasar Target):</label>
    <select id="bahasa">
        <option value="English (US)">English (US) - Tier 1</option>
        <option value="German">German (Jerman) - Tier 1</option>
        <option value="French">French (Prancis) - Tier 1</option>
        <option value="Spanish">Spanish (Spanyol) - Tier 2</option>
        <option value="Indonesian" selected>Indonesian (Indonesia) - Lokal</option>
    </select>

    <button onclick="prosesAI()">🚀 PROSES KONTEN VIRAL</button>
    
    <p id="statusLoading" style="text-align: center; color: #f2cc60; display: none;"></p>

    <div id="hasilCard" class="card">
        <h3 style="color: #58a6ff;">✅ Analisis Selesai! Merender Video...</h3>
        
        <div class="vo-box">
            <h4>🎙️ Naskah Voice Over (<span id="outBahasa"></span>)</h4>
            <p id="outVO" style="font-size: 14px; line-height: 1.6;"></p>
        </div>

        <div class="thumb-box">
            <h4>🖼️ Prompt Thumbnail AI</h4>
            <p id="outThumb" style="font-size: 14px; font-style: italic;"></p>
        </div>

        <div id="videoContainer">
            </div>
    </div>
</div>

<script>
// GANTI DENGAN API KEY OPENAI ANDA
const OPENAI_API_KEY = "sk-dKk1gRLJv1-vBb15hnKMzQ"; 

async function prosesAI() {
    const url = document.getElementById('url').value;
    const durasi = document.getElementById('durasi').value;
    const bahasa = document.getElementById('bahasa').value;
    const isShort = durasi.includes('50 Detik');
    
    if(!url) return alert("Masukkan Link YouTube!");

    document.getElementById('statusLoading').style.display = 'block';
    document.getElementById('statusLoading').innerText = "🧠 AI Sedang Membedah Emosi & Menulis Naskah... (Mohon tunggu)";
    document.getElementById('hasilCard').style.display = 'none';
    document.getElementById('videoContainer').innerHTML = "<p style='color:orange;'>⏳ Memerintahkan PC Lokal untuk merender video... Ini memakan waktu, silakan ngopi dulu.</p>";

    const masterPrompt = `
    Kamu adalah Master Editor UGC. Analisis permintaan berikut dan output HANYA dalam format JSON tulen (tanpa markdown \`\`\`json).
    
    Target Durasi: ${durasi}
    Bahasa VO: ${bahasa}
    
    ATURAN JSON:
    {
      "clips": [{"start": "MM:SS", "end": "MM:SS"}],
      "vo_script": "Teks naskah VO disini",
      "thumbnail_prompt": "Teks prompt thumbnail bahasa inggris disini"
    }

    ATURAN MUTLAK:
    1. Jumlah "clips" di dalam array WAJIB mengikuti Target Durasi (4 klip untuk 50dtk, 7 klip untuk 5mnt, 12 klip untuk 10mnt).
    2. vo_script WAJIB berbahasa ${bahasa}. 
    3. vo_script WAJIB menyisipkan ajakan subscribe SEBELUM membahas adegan klip ke-3, dan di akhir kalimat penutup.
    4. Hitungan kata vo_script WAJIB patuh pada rentang Target Durasi.
    5. thumbnail_prompt WAJIB berbahasa Inggris, detail, cinematic.
    `;

    try {
        // Panggil OpenAI API (Bisa diganti Gemini API jika punya)
        const response = await fetch("https://lite.koboillm.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                model: "openai/gpt-4o-2024-05-13", // Pakai GPT-4 agar hitungan matematikanya pintar
                messages: [{ role: "user", content: masterPrompt }],
                temperature: 0.7
            })
        });

        const data = await response.json();
        const aiText = data.choices[0].message.content;
        const aiData = JSON.parse(aiText);

        // Tampilkan Hasil di Web
        document.getElementById('statusLoading').style.display = 'none';
        document.getElementById('hasilCard').style.display = 'block';
        document.getElementById('outBahasa').innerText = bahasa;
        document.getElementById('outVO').innerText = aiData.vo_script;
        document.getElementById('outThumb').innerText = aiData.thumbnail_prompt;

        // Tembak ke PC Lokal untuk Render
        renderDiPC(url, aiData.clips, isShort);

    } catch (err) {
        document.getElementById('statusLoading').innerText = "❌ Gagal koneksi ke AI. Cek API Key OpenAI Anda.";
        console.error(err);
    }
}

async function renderDiPC(url, clips, isShort) {
    try {
        const response = await fetch('http://localhost:3000/api/potong-youtube', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, clips, isShort })
        });

        const data = await response.json();

        if (data.success) {
            document.getElementById('videoContainer').innerHTML = `
                <video controls autoplay>
                    <source src="${data.videoUrl}" type="video/mp4">
                </video>
                <a href="${data.videoUrl}" download="Mentahan_CineClipper.mp4" class="btn-dl">⬇️ Download Video Mentahan</a>
            `;
        } else {
            document.getElementById('videoContainer').innerHTML = "<p style='color:red;'>❌ Mesin PC gagal memproses video.</p>";
        }
    } catch (err) {
        document.getElementById('videoContainer').innerHTML = "<p style='color:red;'>❌ PC tidak merespon. Pastikan CMD 'node server-clipper.js' MENYALA!</p>";
    }
}
</script>
</body>
</html>
